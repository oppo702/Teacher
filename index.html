const sections = ['objective','certifications','trainings','education','experience','skills','contact'];
const sectionIcons = {objective:'target',certifications:'award',trainings:'book-open',education:'graduation-cap',experience:'briefcase',skills:'bar-chart-2',contact:'mail'};

const defaultConfig = {
  person_name: 'ماجد علي سعيد أبوراس',
  job_title: 'متخصص في القيادة التعليمية والتخطيط الاستراتيجي',

function applyConfig(cfg) {
  const bg = cfg.background_color || defaultConfig.background_color;
  const sf = cfg.surface_color || defaultConfig.surface_color;
  const tx = cfg.text_color || defaultConfig.text_color;
  const pr = cfg.primary_color || defaultConfig.primary_color;
  const ac = cfg.accent_color || defaultConfig.accent_color;
  const ff = cfg.font_family || defaultConfig.font_family;
  const fs = cfg.font_size || defaultConfig.font_size;

  document.documentElement.style.setProperty('--c-primary', pr);
  document.documentElement.style.setProperty('--c-bg', bg);
  document.documentElement.style.setProperty('--c-surface', sf);
  document.documentElement.style.setProperty('--c-text', tx);
  document.documentElement.style.setProperty('--c-accent', ac);
  document.body.style.background = bg;
  document.body.style.color = tx;
  document.body.style.fontFamily = `${ff}, 'DM Sans', 'Tajawal', sans-serif`;

  document.querySelectorAll('.section-card').forEach(c => c.style.background = sf);
  document.querySelectorAll('.hamburger-btn, .lang-switch-btn').forEach(b => b.style.background = sf);
  document.getElementById('sideNav').style.background = sf;
  document.getElementById('langPanel').style.background = sf;

  const avatar = document.getElementById('avatarCircle');
  if(avatar) avatar.style.background = pr;

  document.querySelectorAll('.skill-fill').forEach(f => f.style.background = pr);
  document.querySelectorAll('.timeline-dot').forEach(d => d.style.background = pr);
  document.querySelectorAll('.cert-chip').forEach(c => { c.style.background = pr+'18'; c.style.color = tx; });

  // text content
  const name = cfg.person_name || defaultConfig.person_name;
  const title = cfg.job_title || defaultConfig.job_title;
  document.getElementById('heroName').textContent = name;
  document.getElementById('heroTitle').textContent = title;
  avatar.textContent = name.charAt(0);

  // font size
  document.getElementById('heroName').style.fontSize = `${fs*2.1}px`;
  document.getElementById('heroTitle').style.fontSize = `${fs*1.06}px`;
  document.querySelectorAll('.section-card').forEach(c => c.style.fontSize = `${fs}px`);
}

function renderPage() {
  const L = T[currentLang];

  document.documentElement.lang = currentLang;

  const cfg = window.elementSdk ? window.elementSdk.config : defaultConfig;

  L.cert_items.forEach(c => {
    html += `<div class="cert-chip"><i data-lucide="check-circle" style="width:14px;height:14px;color:var(--c-primary)"></i><div><div style="font-weight:600">${c.t}</div><div style="font-size:11px;opacity:.6">${c.s}</div></div></div>`;
  });
  html += `</div></section>`;

  // Trainings
  html += `<section id="sec-trainings" class="section-card fade-in"><h2 style="font-size:20px;font-weight:700;margin:0 0 16px;display:flex;align-items:center;gap:8px"><i data-lucide="book-open" style="width:22px;height:22px;color:var(--c-primary)"></i>${L.trainings}</h2><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:linear-gradient(135deg, var(--c-primary), var(--c-primary)80);color:#fff;"><th style="text-align:right;padding:12px;font-weight:700;">م</th><th style="text-align:right;padding:12px;font-weight:700;">اسم البرنامج التدريبي</th><th style="text-align:right;padding:12px;font-weight:700;">جهة التدريب</th><th style="text-align:right;padding:12px;font-weight:700;">التاريخ</th><th style="text-align:right;padding:12px;font-weight:700;">عدد الساعات</th></tr></thead><tbody>`;

  });
  html += `</tbody></table></div></section>`;

  // Education
  html += `<section id="sec-education" class="section-card fade-in"><h2 style="font-size:20px;font-weight:700;margin:0 0 16px;display:flex;align-items:center;gap:8px"><i data-lucide="graduation-cap" style="width:22px;height:22px;color:var(--c-primary)"></i>${L.education}</h2>`;

  // Experience
  html += `<section id="sec-experience" class="section-card fade-in"><h2 style="font-size:20px;font-weight:700;margin:0 0 16px;display:flex;align-items:center;gap:8px"><i data-lucide="briefcase" style="width:22px;height:22px;color:var(--c-primary)"></i>${L.experience}</h2>`;

  });
  html += `</section>`;

  // Skills
  html += `<section id="sec-skills" class="section-card fade-in"><h2 style="font-size:20px;font-weight:700;margin:0 0 16px;display:flex;align-items:center;gap:8px"><i data-lucide="bar-chart-2" style="width:22px;height:22px;color:var(--c-primary)"></i>${L.skills}</h2>`;
  L.skill_items.forEach(s => {
    html += `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px"><span>${s.n}</span><span style="font-weight:700;color:var(--c-primary)">${s.v}%</span></div><div class="skill-bar"><div class="skill-fill" style="width:${s.v}%;background:var(--c-primary)"></div></div></div>`;
  });
  html += `</section>`;

  // Contact
  html += `<section id="sec-contact" class="section-card fade-in"><h2 style="font-size:20px;font-weight:700;margin:0 0 16px;display:flex;align-items:center;gap:8px"><i data-lucide="mail" style="width:22px;height:22px;color:var(--c-primary)"></i>${L.contact}</h2>
  <div style="display:grid;gap:12px">
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--c-bg);border-radius:10px"><span style="font-size:20px">📧</span><div><div style="font-size:12px;opacity:.5">Email</div><div style="font-weight:600">${email}</div></div></div>

    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--c-bg);border-radius:10px"><span style="font-size:20px">📍</span><div><div style="font-size:12px;opacity:.5">Location</div><div style="font-weight:600">${L.loc}</div></div></div>
  </div></section>`;

  document.getElementById('mainContent').innerHTML = html;
  lucide.createIcons();
  applyConfig(cfg);

  // Animate skill bars
  setTimeout(()=>{
    document.querySelectorAll('.skill-fill').forEach(f=>{
      const w=f.style.width; f.style.width='0'; requestAnimationFrame(()=>f.style.width=w);
    });
  },200);
}

// Language grid
function buildLangGrid() {
  const grid = document.getElementById('langGrid');
  grid.innerHTML = '';
  Object.keys(T).forEach(code => {
    const l = T[code];
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (code===currentLang?' active':'');
    btn.innerHTML = `${l.flag}<br>${l.label}`;
    btn.onclick = () => { currentLang=code; renderPage(); buildLangGrid(); closeLang(); };
    grid.appendChild(btn);
  });
}

function openNav(){ document.getElementById('sideNav').classList.add('open'); document.getElementById('navOverlay').classList.add('open'); }
function closeNav(){ document.getElementById('sideNav').classList.remove('open'); document.getElementById('navOverlay').classList.remove('open'); }
function openLang(){ document.getElementById('langPanel').classList.add('open'); document.getElementById('langOverlay').classList.add('open'); }
function closeLang(){ document.getElementById('langPanel').classList.remove('open'); document.getElementById('langOverlay').classList.remove('open'); }
function scrollToSection(id){ const el=document.getElementById('sec-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }

document.getElementById('menuBtn').onclick = openNav;
document.getElementById('navOverlay').onclick = closeNav;

document.getElementById('langOverlay').onclick = closeLang;
